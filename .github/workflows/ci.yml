name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancels old runs of the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Tests + coverage
        run: swift test --enable-code-coverage

      - name: Coverage report
        run: ./Scripts/coverage.sh

      - name: Assemble .app (Info.plist + ad-hoc sign)
        run: ./Scripts/build-app.sh release

      - name: Verify universal binary (x86_64 + arm64)
        run: |
          BIN=ClaudeCodeNotify.app/Contents/MacOS/ClaudeCodeNotify
          ARCHS=$(lipo -archs "$BIN")
          echo "archs: $ARCHS"
          echo "$ARCHS" | grep -q x86_64 && echo "$ARCHS" | grep -q arm64 \
            || { echo "::error::binary is not universal: $ARCHS"; exit 1; }

      - name: Verify signature
        run: codesign --verify --verbose ClaudeCodeNotify.app

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: shellcheck Scripts/*.sh
