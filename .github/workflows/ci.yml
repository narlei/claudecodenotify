name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs antigos da mesma ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Montar .app (Info.plist + ad-hoc sign)
        run: ./Scripts/build-app.sh release

      - name: Verificar assinatura
        run: codesign --verify --verbose ClaudeCodeNotify.app

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint dos scripts
        run: shellcheck Scripts/*.sh spike/*.sh
