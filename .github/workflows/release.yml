name: Release on version bump

# When something lands on main (e.g. a merged PR), check whether
# CFBundleShortVersionString in Resources/Info.plist was bumped to a version
# that has no matching tag yet. If so, build the artifacts and publish a
# GitHub release, then update the Homebrew tap in the same run. If the version
# is unchanged the tag already exists and the job exits cleanly.

on:
  push:
    branches: [main]

permissions:
  contents: write

# Never run two releases for main at the same time.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Release (macOS)
    runs-on: macos-latest
    outputs:
      released: ${{ steps.check.outputs.release }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # need full history + tags to detect an existing tag
          fetch-tags: true

      - name: Read version from Info.plist
        id: ver
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Resources/Info.plist)
          [ -n "$VERSION" ] || { echo "::error::empty CFBundleShortVersionString"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"   >> "$GITHUB_OUTPUT"
          echo "Info.plist version: $VERSION"

      - name: Decide whether to release
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1 \
             || git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG" \
             || gh release view "$TAG" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::$TAG already exists — version not bumped, skipping release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$TAG is new — will build and publish a release."
          fi

      - name: Toolchain
        if: steps.check.outputs.release == 'true'
        run: swift --version

      - name: Install dmgbuild (pretty .dmg; falls back to hdiutil if absent)
        if: steps.check.outputs.release == 'true'
        run: |
          python3 -m pip install --user dmgbuild \
            || python3 -m pip install --user --break-system-packages dmgbuild \
            || echo "dmgbuild unavailable — make-dmg.sh will fall back to a plain hdiutil DMG"

      - name: Build, tag and publish release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ./.claude/skills/release/scripts/create-release.sh

  # Update the Homebrew cask in the same run. This sidesteps the GitHub quirk
  # where a release published by the default GITHUB_TOKEN does not trigger the
  # standalone "release: published" workflow. Only runs when a release was cut.
  homebrew:
    name: Update Homebrew Tap
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/homebrew.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
